name: preview-deployment

services:
  traefik:
    image: traefik:v3.6.23
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=preview-network
      - --entrypoints.web.address=:80
      - --accesslog=true
      - --log.level=INFO
    ports:
      - "127.0.0.1:${TRAEFIK_HTTP_PORT:-80}:80"
      - "127.0.0.1:${TRAEFIK_DASHBOARD_PORT:-8082}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - preview
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true

  orchestrator:
    image: ghcr.io/dire-kiwi/preview-deployment:${PREVIEW_DEPLOYMENT_VERSION:-latest}
    environment:
      LISTEN_ADDR: ":8080"
      DOCKER_SOCKET: /var/run/docker.sock
      DOCKER_NETWORK: preview-network
      API_TOKEN: ${API_TOKEN:-}
      PREVIEW_DOMAIN: ${PREVIEW_DOMAIN:-localhost}
      PUBLIC_SCHEME: ${PUBLIC_SCHEME:-http}
      PUBLIC_PORT: ${PUBLIC_PORT:-80}
      RUNTIME_IMAGE: ${RUNTIME_IMAGE:-debian:bookworm-slim}
      TRAEFIK_ENTRYPOINT: web
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-128}
      MAX_BINARY_MB: ${MAX_BINARY_MB:-256}
      MAX_DEPLOYMENTS: ${MAX_DEPLOYMENTS:-20}
      BUILD_CONCURRENCY: ${BUILD_CONCURRENCY:-2}
      DEPLOY_TIMEOUT: ${DEPLOY_TIMEOUT:-10m}
      STOP_TIMEOUT_SECONDS: ${STOP_TIMEOUT_SECONDS:-10}
      PREVIEW_MEMORY_MB: ${PREVIEW_MEMORY_MB:-256}
      PREVIEW_CPUS: ${PREVIEW_CPUS:-0.5}
      PREVIEW_PIDS_LIMIT: ${PREVIEW_PIDS_LIMIT:-128}
      PREVIEW_TMPFS_MB: ${PREVIEW_TMPFS_MB:-64}
    ports:
      - "127.0.0.1:${ORCHESTRATOR_PORT:-8081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - preview
    labels:
      traefik.enable: "true"
      traefik.docker.network: preview-network
      traefik.http.routers.orchestrator.rule: "Host(`${API_HOST:-api.localhost}`)"
      traefik.http.routers.orchestrator.entrypoints: web
      traefik.http.services.orchestrator.loadbalancer.server.port: "8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=384m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/usr/local/bin/orchestrator", "healthcheck"]
      interval: 10s
      timeout: 4s
      retries: 5
      start_period: 10s

networks:
  preview:
    name: preview-network
