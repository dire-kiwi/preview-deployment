name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test and vet
        run: |
          go test ./...
          go vet ./...

      - name: Build commands
        run: go build ./...

      - name: Check installer syntax
        run: sh -n scripts/install-cli.sh scripts/install-stack.sh

  publish-image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/imeredith/preview-deployment
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and publish multi-architecture image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  publish-release:
    needs:
      - test
      - publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build CLI release assets
        env:
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p dist/release

          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            target_os=${target%/*}
            target_arch=${target#*/}
            build_dir=dist/build_${target_os}_${target_arch}
            asset=previewctl_${TAG}_${target_os}_${target_arch}.tar.gz
            mkdir -p "$build_dir"
            CGO_ENABLED=0 GOOS=$target_os GOARCH=$target_arch go build \
              -trimpath \
              -ldflags "-s -w -X main.version=$TAG -X main.commit=$COMMIT -X main.date=$build_date" \
              -o "$build_dir/previewctl" \
              ./cmd/previewctl
            tar -C "$build_dir" -czf "dist/release/$asset" previewctl
          done

          cp compose.yaml dist/release/compose.yaml
          cp .env.example dist/release/.env.example
          cp scripts/install-stack.sh dist/release/install-stack.sh
          cp scripts/install-cli.sh dist/release/install-cli.sh
          chmod 0755 dist/release/install-stack.sh dist/release/install-cli.sh

          cd dist/release
          sha256sum \
            previewctl_*.tar.gz \
            compose.yaml \
            .env.example \
            install-stack.sh \
            install-cli.sh \
            > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/release/previewctl_*.tar.gz
            dist/release/checksums.txt
            dist/release/compose.yaml
            dist/release/.env.example
            dist/release/install-stack.sh
            dist/release/install-cli.sh
